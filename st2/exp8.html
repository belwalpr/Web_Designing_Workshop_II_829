<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <style>
    body{font-family: Arial, sans-serif;margin: 50px;background-color: dimgray;
    }
    h2{text-align:center;}
    .container{display:flex;flex-direction: row;justify-content: center;align-items: center;
    gap:30px;flex-wrap: wrap;
    }
    .card{background-color: #fff;border-radius: 8px;box-shadow: 4px 6px rgba(0,0,0,0.1);
    width: 300px;text-align:center;padding: 16px;
    }
    .avatar{width: 70px; height: 70px;background: #007bff; color:#fff;border-radius: 50px;
    display: flex; justify-content: center; align-items: center;font-size: 20px; margin:0 auto 12px; 
    }
    .name{font-weight: bold; font-size: 18 px;}
    .detail{font-size: 14px; color : #555; margin: 2 px 0;}
    </style>
</head>
<body>
    <h2>Student Profile Card</h2>
    <div class="container">
        <div class="card">
            <div class="avatar">PB</div>
            <div class="name">Pragya Belwal</div>
            <div class="detail">Roll No. = 2025B01010074</div>
            <div class="details">Course = BTech</div>
            <div class="details">Branch = CSE</div>
            <div class="details">1st year</div>
        </div>
        <div class="card">
            <div class="avatar">HS</div>
            <div class="name">Hriday Sharma</div>
            <div class="detail">Roll No. = 2022B01019074</div>

        <div class="card">

    </div>
    </body>
</html>
